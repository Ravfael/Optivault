[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
optivault = "GAKRYNWn7YjHQB8ihiBYYn1QVp2g4vVt8wtTyEK65syZ"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[hooks]

[test]
startup_wait = 5000

[test.validator]
url = "https://api.devnet.solana.com"